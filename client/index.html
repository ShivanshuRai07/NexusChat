<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nexus | Secure Subnet</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Unified Entry Screen -->
    <div id="entry-container" class="glass-panel">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <h1>Nexus Subnet</h1>
      </div>
      <p style="margin-bottom: 25px; font-size:0.95rem;">Enter the virtual network to access your live peers.</p>
      
      <form id="entry-form" style="text-align:left;">
        <label for="username-input" style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">1. Your Secure Alias</label>
        <input type="text" id="username-input" placeholder="E.g. Agent007" required autocomplete="off" style="margin-bottom: 15px;" />
        
        <label for="network-code-input" style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">2. Protocol Action</label>
        <input type="text" id="network-code-input" placeholder="Enter Existing Network Code" autocomplete="off" style="margin-bottom: 15px;" required />
        <button type="submit" id="join-network-btn">Join Network</button>
      </form>
      
      <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin: 15px 0;">OR</div>
      
      <button type="button" id="open-create-modal-btn" class="secondary">Create Network</button>
    </div>

    <!-- Main Chat UI (hidden initially) -->
    <div id="chat-container" class="hidden">
      
      <!-- Sidebar for Active Peers -->
      <aside id="sidebar-view" class="sidebar">
        <div class="sidebar-header" style="display:flex; gap: 8px;">
          <select id="network-switcher" style="flex:1; font-size: 1.1rem; color: var(--accent-color); background: transparent; border: 1px solid var(--border-color); border-radius: 4px; padding: 4px;">
            <option value="">Select Network...</option>
          </select>
          <button type="button" id="leave-network-btn" class="icon-btn" title="Leave & Forget Subnet" style="color: #ef4444; width:40px; padding:0; display:flex; justify-content:center; align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </div>
        <div style="padding: 10px 16px; background: #111b21; border-bottom: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-muted);">
          LIVE SUBNET PEERS
        </div>
        <ul id="rooms-list">
           <!-- Dynamic peer list goes here -->
        </ul>
        
        <!-- LOGOUT FOOTER -->
        <div class="sidebar-footer" style="padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); height: 60px;">
           <div style="font-size: 0.85rem; color: var(--text-muted);">Alias: <strong id="sidebar-alias" style="color: #e9edef;"></strong></div>
           <button type="button" id="logout-btn" class="icon-btn" title="Log Out" style="width: auto; padding: 8px; color: #ef4444; display:flex; gap:8px; align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
           </button>
           <button type="button" id="force-clear-btn" class="icon-btn" title="Clear Stuck Cache" style="width: auto; padding: 8px; color: #f59e0b; display:flex; gap:8px; align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16"></path></svg>
           </button>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main id="chat-view" class="chat-area mobile-hidden">
        
        <!-- Empty State -->
        <div id="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px; opacity: 0.5;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <h2>Network Connected</h2>
          <p>Select a peer from the side panel to initiate a private data tunnel.</p>
        </div>

        <!-- Active Chat Interface -->
        <div id="active-chat-ui" class="hidden">
          <header class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
              <button id="mobile-back-btn" class="icon-btn mobile-only">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              </button>
              <div class="header-info">
                <h2 id="current-peer-name" style="font-size: 1.1rem; margin:0;">Peer Alias</h2>
                <span style="display:block; margin-top:2px; font-size: 0.75rem; color: var(--text-muted);">
                  <span class="status-dot"></span> IP Target Hooked
                </span>
              </div>
            </div>
          </header>

          <ul id="messages-list">
            <!-- Messages injected here -->
          </ul>
          
          <div id="typing-indicator" class="hidden">
             <div class="typing-dots">
               <span class="dot"></span><span class="dot"></span><span class="dot"></span>
             </div>
             <div>Typing...</div>
          </div>

          <!-- Attachment Preview Box -->
          <div id="attachment-preview" class="hidden" style="display:flex; flex-wrap:wrap; gap:10px; padding: 10px; border-top: 1px solid var(--border-color); background: #0b141a;">
             <!-- Multiple thumbnails injected here -->
          </div>

          <form id="message-form">
            <!-- Media Attachment -->
            <button type="button" id="attachment-trigger-btn" class="icon-btn" title="Add File(s)" style="width:40px; height:40px; padding: 0; display:flex; justify-content:center; align-items:center;" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input type="file" id="media-input" multiple hidden />
            
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled/>
            <button type="submit" id="send-btn" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </form>
        </div>
      </main>
    </div>

    <!-- Create Network Modal -->
    <div id="create-modal" class="modal hidden">
      <div class="modal-content glass-panel" style="text-align: left; max-width: 450px;">
        <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Create Chat Network</h3>
        
        <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">1. Name the Network</label>
        <input type="text" id="modal-network-name" placeholder="E.g. Group XYZ" autocomplete="off" style="margin-bottom: 20px;" />
        
        <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">2. Auto-Generated Network Code</label>
        <div style="display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 8px;">
          <input type="text" id="modal-network-code" readonly style="margin: 0; background: transparent; font-weight: bold; letter-spacing: 1px; border: none; outline: none; flex: 1;" />
          <button type="button" id="modal-copy-code-btn" style="width: auto; padding: 0 15px;">Copy Code</button>
        </div>
        
        <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">3. Direct Share Link</label>
        <div style="display: flex; gap: 8px; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 8px;">
          <input type="text" id="modal-network-link" readonly style="margin: 0; background: transparent; font-size: 0.8rem; color: var(--accent-color); border: none; outline: none; flex: 1;" />
          <button type="button" id="modal-copy-link-btn" style="width: auto; padding: 0 15px;">Copy Link</button>
        </div>
        
        <div style="display:flex; gap: 10px;">
          <button type="button" id="finalize-create-btn" style="flex:2;">Create Network</button>
          <button type="button" id="cancel-create-btn" class="secondary" style="flex:1;">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Custom App Alert Popup -->
    <div id="custom-alert" class="modal hidden">
      <div class="modal-content glass-panel" style="text-align: center;">
        <h3 id="custom-alert-title">Notification</h3>
        <p id="custom-alert-message" style="margin: 15px 0 25px 0;"></p>
        <button type="button" id="custom-alert-close">Acknowledge</button>
      </div>
    </div>

    <!-- Image Lightbox Modal -->
    <div id="image-lightbox" class="modal hidden" style="background: rgba(0,0,0,0.95);">
      <div style="position:relative; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1001;">
         <button type="button" id="lightbox-close" style="position:absolute; top:20px; right:20px; background:transparent; color:white; font-size:40px; border:none; cursor:pointer; width:auto; line-height:1; z-index:1002;">&times;</button>
         <img id="lightbox-img" src="" style="max-width:90%; max-height:80%; object-fit:contain; border-radius:8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);" />
         <a id="lightbox-download" href="" download="Nexus_Media.jpg" style="margin-top:20px; padding:12px 24px; background:var(--accent-color); color:#fff; text-decoration:none; border-radius:8px; font-weight:bold; font-size:1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">Download Image</a>
      </div>
    </div>

    <script type="module" src="/src/main.js?v=2.5"></script>
  </body>
</html>
